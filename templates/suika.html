<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>長庚西瓜遊戲 — CampusCoin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      abyss:"#06111b", midnight:"#0b1f31", tide:"#12314b",
      trust:"#7dd3fc", mint:"#5eead4", glow:"#f6c86b"
    }}}};
  </script>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: "Segoe UI Variable Display","Aptos","Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(94,234,212,.08) 0%, transparent 30%),
        radial-gradient(circle at 85% 5%,  rgba(125,211,252,.08) 0%, transparent 30%),
        linear-gradient(160deg,#041019 0%,#0a1f31 45%,#112d46 100%);
      min-height:100vh; user-select:none; -webkit-user-select:none;
    }
    .glass {
      background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    }
    .score-glow { text-shadow:0 0 20px rgba(246,200,107,.6),0 0 40px rgba(246,200,107,.3); }
    #gameCanvas {
      display:block; touch-action:none;
      border-radius:0 0 14px 14px;
      box-shadow:0 24px 64px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.04);
    }
    #gameCanvas.clear-mode { cursor:crosshair; }
    #gameCanvas.normal-mode { cursor:crosshair; }
    .canvas-cap {
      background:linear-gradient(180deg,#1e3f7a 0%,#152e5a 100%);
      border-radius:14px 14px 0 0;
      border:1px solid rgba(255,255,255,.09); border-bottom:none;
    }
    .modal-enter { animation:mPop .3s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes mPop {
      from{opacity:0;transform:scale(.84) translateY(14px);}
      to  {opacity:1;transform:scale(1)   translateY(0);}
    }
    .chain-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
    .blink{animation:blink 1.8s ease-in-out infinite;}
    .clear-pulse{animation:clearPulse 0.9s ease-in-out infinite;}
    @keyframes clearPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,146,60,.4)}50%{box-shadow:0 0 0 6px rgba(251,146,60,0)}}
    ::-webkit-scrollbar{width:0;}
  </style>
</head>
<body class="text-white">

<!-- Header -->
<div class="flex items-center gap-3 px-4 pt-3 pb-2 max-w-2xl mx-auto">
  <a id="backLink" href="/"
     class="glass rounded-xl px-4 py-1.5 text-sm text-trust hover:bg-white/10 transition shrink-0">← 返回</a>
  <h1 class="text-base font-bold text-glow">🍉 長庚西瓜遊戲</h1>
  <span id="accountBadge" class="ml-auto text-xs text-white/30 font-mono truncate max-w-[100px]"></span>
</div>

<!-- Layout -->
<div class="flex gap-3 justify-center px-3 max-w-2xl mx-auto pb-6" id="gameLayout">

  <!-- Canvas -->
  <div class="flex-shrink-0 flex flex-col">
    <div class="canvas-cap px-3 py-2 flex items-center justify-between">
      <span class="text-[11px] text-white/35">拖曳瞄準 · 點擊投放</span>
      <div class="flex items-center gap-1.5">
        <div class="chain-dot blink" id="chainDot" style="background:#5eead4"></div>
        <span class="text-[11px] text-white/35" id="chainLabel">連線中</span>
      </div>
    </div>
    <canvas id="gameCanvas" class="normal-mode"></canvas>
  </div>

  <!-- Side panel -->
  <div class="flex flex-col gap-2.5 w-[138px] flex-shrink-0 pt-0.5">

    <div class="glass rounded-2xl p-3.5 text-center">
      <div class="text-[10px] text-white/35 uppercase tracking-widest mb-1">SCORE</div>
      <div class="text-[34px] font-black leading-none score-glow text-glow" id="scoreDisplay">0</div>
    </div>

    <!-- Next ball (hidden in wild-ball mode) -->
    <div class="glass rounded-2xl p-3 text-center" id="nextCard">
      <div class="text-[10px] text-white/35 uppercase tracking-widest mb-2">NEXT</div>
      <canvas id="nextCanvas" width="90" height="90" class="mx-auto rounded-xl"></canvas>
      <div class="text-[11px] text-white/45 mt-1.5 leading-tight" id="nextName">--</div>
    </div>

    <!-- Wild ball picker (shown when suika_wild active) -->
    <div class="glass rounded-2xl p-3 hidden" id="wildPanel">
      <div class="text-[10px] text-white/35 uppercase tracking-widest mb-2">🎱 萬能球 — 選擇</div>
      <div id="wildGrid" class="grid grid-cols-3 gap-1"></div>
      <div class="text-[10px] text-white/30 mt-2 text-center">點擊選擇下一顆球</div>
    </div>

    <!-- Clear mode button (shown when suika_boom active) -->
    <button id="clearBtn" class="hidden glass rounded-xl py-2 text-[12px] font-semibold w-full transition active:scale-95"
            style="border-color:rgba(251,146,60,.35);color:#fb923c"
            onclick="toggleClearMode()">
      ☄️ 隕石清場
    </button>
    <div id="clearHint" class="hidden text-[11px] text-orange-400/70 text-center -mt-1">點擊場上任意球消除同類</div>

    <div class="glass rounded-2xl p-3">
      <div class="text-[10px] text-white/35 uppercase tracking-widest mb-2">帳戶</div>
      <div class="text-[13px] font-bold text-mint leading-none" id="balanceDisplay">--</div>
      <div class="flex items-center gap-1.5 mt-1.5">
        <div class="chain-dot" id="chainDot2" style="background:#94a3b8"></div>
        <span class="text-[11px] text-white/40" id="chainStatus2">載入中…</span>
      </div>
    </div>

    <div class="glass rounded-2xl p-3 hidden" id="effectsPanel">
      <div class="text-[10px] text-white/35 uppercase tracking-widest mb-2">⚡ 雲端加成</div>
      <div id="effectsList" class="space-y-1.5"></div>
    </div>

    <div class="glass rounded-2xl p-3 overflow-y-auto" style="max-height:230px">
      <div class="text-[10px] text-white/35 uppercase tracking-widest mb-2">進化表</div>
      <div id="fruitList" class="space-y-0.5"></div>
    </div>
  </div>
</div>

<!-- Game Over Modal -->
<div id="gameOverOverlay"
     class="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center z-50 hidden">
  <div class="glass rounded-3xl p-7 text-center w-[300px] max-w-[92vw] modal-enter"
       style="border-color:rgba(255,255,255,.14)">
    <div class="text-[11px] text-white/35 uppercase tracking-widest mb-1">GAME OVER</div>
    <div class="text-[58px] font-black leading-none score-glow text-glow my-2" id="modalScore">0</div>
    <div class="text-[11px] text-white/35 mb-3">最終分數</div>
    <div class="text-[22px] font-bold text-mint mb-0.5" id="modalCpc">+0 CPC</div>
    <div class="text-[11px] text-white/40 mb-1" id="modalFormula"></div>
    <div class="text-[11px] text-mint/50 mb-3 min-h-[14px]" id="modalBlock"></div>
    <div class="text-sm min-h-[18px] mb-4" id="modalStatus"></div>
    <div class="flex flex-col gap-2">
      <button id="claimBtn"
        class="w-full bg-gradient-to-r from-mint to-trust rounded-xl py-2.5 font-bold text-midnight text-[13px] hover:opacity-90 active:scale-95 transition"
        onclick="claimReward()">🎁 領取 CPC 獎勵</button>
      <div class="flex gap-2">
        <button onclick="restartGame()"
          class="flex-1 glass rounded-xl py-2 text-[12px] hover:bg-white/10 active:scale-95 transition">再玩一次</button>
        <button onclick="goBack()"
          class="flex-1 glass rounded-xl py-2 text-[12px] hover:bg-white/10 active:scale-95 transition">返回</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Fruit definitions (CGU / 長庚大學 theme) ──────────────────
const FRUITS = [
  { name:'CGU校徽',    emoji:'🟢', r:17,  hex:'#1a6b3a', score:1  },
  { name:'考試卷',     emoji:'📝', r:23,  hex:'#2e6fbe', score:3  },
  { name:'長庚便當',   emoji:'🍱', r:30,  hex:'#c97b18', score:6  },
  { name:'腳踏車',     emoji:'🚲', r:38,  hex:'#1e8a4e', score:10 },
  { name:'畢業帽',     emoji:'🎓', r:47,  hex:'#7c3aaa', score:15 },
  { name:'系館',       emoji:'🏫', r:57,  hex:'#b03020', score:21 },
  { name:'長庚校樹',   emoji:'🌳', r:68,  hex:'#0e7a68', score:28 },
  { name:'長庚圖書館', emoji:'🏛️', r:80,  hex:'#1a6fa8', score:36 },
  { name:'長庚龍',     emoji:'🐉', r:92,  hex:'#b8620a', score:45 },
  { name:'長庚之光',   emoji:'✨', r:106, hex:'#a88a08', score:55 },
  { name:'長庚西瓜',   emoji:'🍉', r:121, hex:'#8B1515', score:66 },
];
const SPAWN_POOL = 5;

// ── Canvas ────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CW = 360, CH = 560;
canvas.width = CW; canvas.height = CH;
const WALL_L = 7, WALL_R = CW-7, FLOOR_Y = CH-7;
const DROP_Y = 68, DANGER_Y = 112;

function scaleCanvas() {
  const maxW = Math.min(CW, document.getElementById('gameLayout').clientWidth - 150);
  canvas.style.width  = maxW + 'px';
  canvas.style.height = (maxW * CH / CW) + 'px';
}
window.addEventListener('resize', scaleCanvas);
scaleCanvas();

// ── URL params ────────────────────────────────────────────────
const _params  = new URLSearchParams(location.search);
const account  = _params.get('account') || '';
const backUrl  = _params.get('back') || (account ? `/dashboard?account=${account}` : '/');

// ── Shop effect state ─────────────────────────────────────────
let activeFx    = {};
let cpcCap      = 500;
let wildAvail   = false;   // suika_wild effect
let boomAvail   = false;   // suika_boom effect
let clearMode   = false;   // clear-mode active
let wildUsed    = false;
let boomUsed    = false;

// ── Game state ────────────────────────────────────────────────
let balls = [], curIdx = rndIdx(), nxtIdx = rndIdx();
let score = 0, gameOver = false, mouseX = CW/2;
let dropCool = 0, mergeQueue = [], dangerTimer = 0, rewardClaimed = false;
let floats = [], ripples = [], particles = [];

// ── Ball class ────────────────────────────────────────────────
class Ball {
  constructor(x, y, fi, vx=0, vy=0) {
    this.x=x; this.y=y; this.fi=fi; this.r=FRUITS[fi].r;
    this.vx=vx; this.vy=vy; this.age=0; this.merging=false;
    this.rot=0; this.angVel=0;
  }
}

// ── Physics constants ─────────────────────────────────────────
const GRAV=0.55, REST=0.14, FRIC=0.80, STEPS=6, MAX_V=18, MIN_AGE=14;

function physicsStep() {
  for (const b of balls) {
    if (b.merging) continue;
    b.vy += GRAV;
    b.vx  = clamp(b.vx,-MAX_V,MAX_V);
    b.vy  = clamp(b.vy,-MAX_V,MAX_V);
    b.age++;
  }
  for (let s=0; s<STEPS; s++) {
    for (const b of balls) { if(!b.merging){b.x+=b.vx/STEPS;b.y+=b.vy/STEPS;} }
    resolveWalls(); resolveBalls();
  }
  // Rolling — applied AFTER collision so velocity is final
  for (const b of balls) {
    if (b.merging) continue;
    const onFloor = b.y+b.r >= FLOOR_Y-2;
    const onLeft  = b.x-b.r <= WALL_L+2;
    const onRight = b.x+b.r >= WALL_R-2;
    if (onFloor) {
      // Strong coupling on floor: rolls with horizontal velocity
      b.angVel += (b.vx/b.r - b.angVel) * 0.72;
    } else if (onLeft) {
      // Rolling down left wall
      b.angVel += (b.vy/b.r - b.angVel) * 0.45;
    } else if (onRight) {
      // Rolling down right wall (opposite direction)
      b.angVel += (-b.vy/b.r - b.angVel) * 0.45;
    } else {
      // In air: preserve spin, near-zero damping
      b.angVel *= 0.9995;
    }
    b.rot += b.angVel;
  }
  processMerges();
}

function resolveWalls() {
  for (const b of balls) {
    if (b.merging) continue;
    if (b.x-b.r<WALL_L)  { b.x=WALL_L+b.r;   if(b.vx<0)b.vx*=-REST; }
    if (b.x+b.r>WALL_R)  { b.x=WALL_R-b.r;   if(b.vx>0)b.vx*=-REST; }
    if (b.y+b.r>FLOOR_Y) { b.y=FLOOR_Y-b.r;  if(b.vy>0){b.vy*=-REST;b.vx*=FRIC;} }
  }
}

function resolveBalls() {
  const n=balls.length;
  for (let i=0;i<n;i++) {
    const a=balls[i]; if(a.merging) continue;
    for (let j=i+1;j<n;j++) {
      const b=balls[j]; if(b.merging) continue;
      const dx=b.x-a.x, dy=b.y-a.y, minD=a.r+b.r, d2=dx*dx+dy*dy;
      if (d2>=minD*minD||d2<0.001) continue;
      const dist=Math.sqrt(d2), nx=dx/dist, ny=dy/dist;
      if (a.fi===b.fi&&a.fi<FRUITS.length-1&&a.age>MIN_AGE&&b.age>MIN_AGE) {
        a.merging=b.merging=true; mergeQueue.push([a,b]); continue;
      }
      const push=(minD-dist)/2;
      a.x-=nx*push; a.y-=ny*push; b.x+=nx*push; b.y+=ny*push;
      const dvx=a.vx-b.vx,dvy=a.vy-b.vy,dot=dvx*nx+dvy*ny;
      if(dot>0){const imp=(1+REST)*dot*0.5;a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;}
    }
  }
}

function processMerges() {
  if (!mergeQueue.length) return;
  for (const [a,b] of mergeQueue) {
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, ni=a.fi+1;
    balls=balls.filter(bb=>bb!==a&&bb!==b);
    const nb=new Ball(mx,my,ni,(a.vx+b.vx)*0.2,(a.vy+b.vy)*0.2);
    balls.push(nb);
    score+=FRUITS[ni].score;
    spawnParticles(mx,my,FRUITS[ni].hex,FRUITS[ni].r);
    ripples.push({x:mx,y:my,r:FRUITS[ni].r*0.4,max:FRUITS[ni].r*2.6,color:FRUITS[ni].hex,a:1});
    floats.push({x:mx,y:my-10,txt:`+${FRUITS[ni].score}`,vy:-1.9,a:1,life:65,sc:1.35});
    if (ni===FRUITS.length-1)
      floats.push({x:mx,y:my-34,txt:'🍉 長庚西瓜！',vy:-1.1,a:1,life:130,sc:1.2});
  }
  mergeQueue=[];
  document.getElementById('scoreDisplay').textContent=score;
}

// ── Particles ─────────────────────────────────────────────────
function spawnParticles(x,y,color,radius,big=false) {
  const n=big?24:Math.min(8+Math.floor(radius/13),18);
  const sp=big?4:1.6;
  for (let i=0;i<n;i++) {
    const ang=(Math.PI*2*i/n)+Math.random()*0.4, spd=sp+Math.random()*(big?4:3.2);
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
      r:2.5+Math.random()*(big?5:3),color,a:1,life:28+Math.floor(Math.random()*(big?30:18))});
  }
}

// ── Danger check ──────────────────────────────────────────────
const DANGER_FRAMES=90;
function checkDanger() {
  let risk=false;
  for (const b of balls) { if(!b.merging&&b.y-b.r<DANGER_Y&&b.age>45){risk=true;break;} }
  if (risk) { if(++dangerTimer>=DANGER_FRAMES) triggerGameOver(); }
  else       { dangerTimer=Math.max(0,dangerTimer-2); }
}

function triggerGameOver() {
  if (gameOver) return;
  gameOver=true;
  const cpc=calcCpc();
  document.getElementById('modalScore').textContent=score;
  document.getElementById('modalCpc').textContent=`+${cpc} CPC`;
  document.getElementById('modalFormula').textContent=`分數 ÷ 3，上限 ${cpcCap} CPC`;
  document.getElementById('modalBlock').textContent='';
  if (!account) {
    document.getElementById('claimBtn').style.display='none';
    document.getElementById('modalStatus').textContent='⚠️ 請登入後才能領取 CPC';
  }
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

// ── Drop ──────────────────────────────────────────────────────
function tryDrop(rawX) {
  if (gameOver||dropCool>0) return;
  const r=FRUITS[curIdx].r, cx=clamp(rawX,WALL_L+r,WALL_R-r);
  balls.push(new Ball(cx,DROP_Y,curIdx));
  curIdx=nxtIdx; nxtIdx=rndIdx(); dropCool=28;
  // If wild ball was set but another was already determined, just move on
  drawNextPreview();
}

// ── Wild ball ─────────────────────────────────────────────────
function buildWildGrid() {
  const grid=document.getElementById('wildGrid');
  grid.innerHTML='';
  FRUITS.forEach((f,i)=>{
    const btn=document.createElement('button');
    btn.title=f.name;
    btn.className='flex items-center justify-center rounded-lg p-1 hover:bg-white/15 active:scale-90 transition text-[22px]';
    btn.style.background=`${f.hex}22`;
    btn.style.border=`1px solid ${f.hex}55`;
    btn.textContent=f.emoji;
    btn.onclick=()=>selectWildBall(i);
    grid.appendChild(btn);
  });
}

function selectWildBall(fi) {
  curIdx=fi;
  wildUsed=true;
  wildAvail=false;
  document.getElementById('wildPanel').classList.add('hidden');
  document.getElementById('nextCard').classList.remove('hidden');
  drawNextPreview();
}

// ── Clear mode (☄️ 隕石清場) ──────────────────────────────────
function toggleClearMode() {
  if (boomUsed||gameOver) return;
  clearMode=!clearMode;
  const btn=document.getElementById('clearBtn');
  const hint=document.getElementById('clearHint');
  if (clearMode) {
    canvas.className='clear-mode';
    btn.classList.add('clear-pulse');
    btn.textContent='☄️ 取消清場';
    hint.classList.remove('hidden');
  } else {
    canvas.className='normal-mode';
    btn.classList.remove('clear-pulse');
    btn.textContent='☄️ 隕石清場';
    hint.classList.add('hidden');
  }
}

function handleClearClick(x,y) {
  for (const b of balls) {
    if (b.merging) continue;
    const dx=b.x-x, dy=b.y-y;
    if (dx*dx+dy*dy<=b.r*b.r) {
      const fi=b.fi;
      const cleared=balls.filter(bb=>bb.fi===fi&&!bb.merging);
      cleared.forEach(bb=>{
        spawnParticles(bb.x,bb.y,FRUITS[fi].hex,FRUITS[fi].r,true);
        ripples.push({x:bb.x,y:bb.y,r:FRUITS[fi].r*.5,max:FRUITS[fi].r*3,color:'#fb923c',a:1});
      });
      balls=balls.filter(bb=>bb.fi!==fi||bb.merging);
      floats.push({x:CW/2,y:CH/2-40,txt:`☄️ 清除 ${cleared.length} 顆！`,vy:-1.2,a:1,life:100,sc:1.4});
      boomUsed=true; boomAvail=false; clearMode=false;
      canvas.className='normal-mode';
      document.getElementById('clearBtn').classList.add('hidden');
      document.getElementById('clearHint').classList.add('hidden');
      return;
    }
  }
}

// ── Drawing ───────────────────────────────────────────────────
function drawBall(c,x,y,fi,alpha=1,rot=0) {
  const f=FRUITS[fi];
  c.save(); c.globalAlpha=alpha; c.translate(x,y);
  // Drop shadow
  c.shadowColor='rgba(0,0,0,.55)'; c.shadowBlur=14; c.shadowOffsetX=2; c.shadowOffsetY=5;
  c.beginPath(); c.arc(0,0,f.r,0,Math.PI*2); c.fillStyle=f.hex; c.fill();
  // 3-D sphere gradient
  c.shadowColor='transparent'; c.shadowBlur=0;
  const sp=c.createRadialGradient(-f.r*.30,-f.r*.33,f.r*.02,f.r*.12,f.r*.15,f.r*1.12);
  sp.addColorStop(0,'rgba(255,255,255,.62)'); sp.addColorStop(.22,'rgba(255,255,255,.20)');
  sp.addColorStop(.55,'rgba(0,0,0,.04)');     sp.addColorStop(1,'rgba(0,0,0,.44)');
  c.beginPath(); c.arc(0,0,f.r,0,Math.PI*2); c.fillStyle=sp; c.fill();
  // Specular
  const sc=c.createRadialGradient(-f.r*.27,-f.r*.33,0,-f.r*.20,-f.r*.25,f.r*.38);
  sc.addColorStop(0,'rgba(255,255,255,.82)'); sc.addColorStop(1,'rgba(255,255,255,0)');
  c.beginPath(); c.arc(0,0,f.r,0,Math.PI*2); c.fillStyle=sc; c.fill();
  // Rim
  c.strokeStyle='rgba(255,255,255,.13)'; c.lineWidth=1.5;
  c.beginPath(); c.arc(0,0,f.r,0,Math.PI*2); c.stroke();
  // Emoji rotates with ball
  c.rotate(rot);
  c.font=`${Math.round(f.r*1.10)}px serif`;
  c.textAlign='center'; c.textBaseline='middle'; c.fillStyle='rgba(255,255,255,.96)';
  c.fillText(f.emoji,0,2);
  c.restore();
}

function drawContainerBg() {
  const bg=ctx.createLinearGradient(0,DANGER_Y,0,FLOOR_Y);
  bg.addColorStop(0,'#060c18'); bg.addColorStop(1,'#0b1528');
  ctx.fillStyle=bg; ctx.fillRect(WALL_L,DANGER_Y,WALL_R-WALL_L,FLOOR_Y-DANGER_Y);
  ctx.fillStyle='rgba(255,255,255,.018)';
  const sp=22;
  for (let gx=WALL_L+sp/2;gx<WALL_R;gx+=sp)
    for (let gy=DANGER_Y+sp/2;gy<FLOOR_Y;gy+=sp){
      ctx.beginPath();ctx.arc(gx,gy,1.2,0,Math.PI*2);ctx.fill();
    }
  const gl=ctx.createLinearGradient(0,FLOOR_Y-16,0,FLOOR_Y);
  gl.addColorStop(0,'rgba(255,255,255,0)'); gl.addColorStop(1,'rgba(255,255,255,.05)');
  ctx.fillStyle=gl; ctx.fillRect(WALL_L,FLOOR_Y-16,WALL_R-WALL_L,16);
}

function drawWalls() {
  const lw=ctx.createLinearGradient(0,0,WALL_L+4,0);
  lw.addColorStop(0,'#12357a'); lw.addColorStop(1,'#1a4fa8');
  ctx.fillStyle=lw; ctx.fillRect(0,0,WALL_L,CH);
  ctx.fillStyle='rgba(255,255,255,.09)'; ctx.fillRect(WALL_L-1,0,1.5,CH);
  const rw=ctx.createLinearGradient(WALL_R-4,0,CW,0);
  rw.addColorStop(0,'#1a4fa8'); rw.addColorStop(1,'#12357a');
  ctx.fillStyle=rw; ctx.fillRect(WALL_R,0,CW-WALL_R,CH);
  ctx.fillStyle='rgba(255,255,255,.09)'; ctx.fillRect(WALL_R-.5,0,1.5,CH);
  const fw=ctx.createLinearGradient(0,FLOOR_Y-2,0,CH);
  fw.addColorStop(0,'#1a4fa8'); fw.addColorStop(1,'#12357a');
  ctx.fillStyle=fw; ctx.fillRect(0,FLOOR_Y,CW,CH-FLOOR_Y);
  ctx.fillStyle='rgba(255,255,255,.11)'; ctx.fillRect(0,FLOOR_Y-1,CW,1.5);
}

function drawFrame() {
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#070e1c'; ctx.fillRect(0,0,CW,CH);
  drawContainerBg(); drawWalls();

  // Danger line
  const t=Date.now()/1000, hot=dangerTimer>30;
  const p=dangerTimer>0?.5+.5*Math.sin(t*8):.28+.10*Math.sin(t*1.5);
  ctx.save();
  ctx.strokeStyle=`rgba(${hot?'231,76,60':'200,100,80'},${p})`;
  ctx.lineWidth=hot?2.5:1.5; ctx.setLineDash([7,5]);
  ctx.beginPath(); ctx.moveTo(WALL_L,DANGER_Y); ctx.lineTo(WALL_R,DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=`rgba(231,76,60,${p})`;
  ctx.font='bold 9px sans-serif'; ctx.textAlign='right';
  ctx.fillText('DANGER',WALL_R-4,DANGER_Y-4); ctx.restore();

  // Clear mode crosshair overlay
  if (clearMode&&!gameOver) {
    ctx.save(); ctx.strokeStyle='rgba(251,146,60,.35)'; ctx.lineWidth=1.5;
    ctx.strokeRect(WALL_L,DANGER_Y,WALL_R-WALL_L,FLOOR_Y-DANGER_Y); ctx.restore();
  }

  // Drop guide
  if (!gameOver&&dropCool<=10&&!clearMode) {
    const r=FRUITS[curIdx].r, cx=clamp(mouseX,WALL_L+r,WALL_R-r);
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,.07)'; ctx.lineWidth=1;
    ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(cx,DROP_Y+r+6); ctx.lineTo(cx,FLOOR_Y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  // Ripples
  for (let i=ripples.length-1;i>=0;i--) {
    const rp=ripples[i];
    ctx.beginPath(); ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);
    ctx.strokeStyle=rp.color; ctx.globalAlpha=rp.a; ctx.lineWidth=3; ctx.stroke();
    ctx.globalAlpha=1; rp.r+=(rp.max-rp.r)*.18+1.2; rp.a-=.048;
    if(rp.a<=0)ripples.splice(i,1);
  }

  // Particles
  for (let i=particles.length-1;i>=0;i--) {
    const pp=particles[i];
    ctx.beginPath(); ctx.arc(pp.x,pp.y,Math.max(pp.r*pp.a,.5),0,Math.PI*2);
    ctx.fillStyle=pp.color; ctx.globalAlpha=pp.a*.9; ctx.fill(); ctx.globalAlpha=1;
    pp.x+=pp.vx; pp.y+=pp.vy; pp.vy+=.10; pp.vx*=.96; pp.a-=1/pp.life; pp.life--;
    if(pp.life<=0)particles.splice(i,1);
  }

  // Balls
  for (const b of balls) { if(!b.merging) drawBall(ctx,b.x,b.y,b.fi,1,b.rot); }

  // Drop preview (hide in clear mode)
  if (!gameOver&&!clearMode) {
    const r=FRUITS[curIdx].r, cx=clamp(mouseX,WALL_L+r,WALL_R-r);
    drawBall(ctx,cx,DROP_Y,curIdx,dropCool>0?.28:.78,0);
  }

  // Floating texts
  for (let i=floats.length-1;i>=0;i--) {
    const ft=floats[i];
    ctx.save(); ctx.globalAlpha=ft.a; ctx.translate(ft.x,ft.y); ctx.scale(ft.sc,ft.sc);
    ctx.fillStyle='#f6c86b'; ctx.font='bold 14px "Segoe UI",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(246,200,107,.55)'; ctx.shadowBlur=10;
    ctx.fillText(ft.txt,0,0); ctx.restore();
    ft.y+=ft.vy; ft.sc=ft.sc>.99?ft.sc*.87:1; ft.a-=1.2/ft.life; ft.life--;
    if(ft.life<=0)floats.splice(i,1);
  }

  // Danger flash
  if (dangerTimer>DANGER_FRAMES*.48) {
    const pp=(dangerTimer-DANGER_FRAMES*.48)/(DANGER_FRAMES*.52);
    ctx.fillStyle=`rgba(231,76,60,${pp*(.5+.5*Math.sin(Date.now()/75))*.16})`;
    ctx.fillRect(0,0,CW,CH);
  }
}

// ── Next preview ──────────────────────────────────────────────
const nCtx=document.getElementById('nextCanvas').getContext('2d');
function drawNextPreview() {
  nCtx.clearRect(0,0,90,90);
  const bg=nCtx.createRadialGradient(45,40,0,45,40,50);
  bg.addColorStop(0,'rgba(26,55,110,.85)'); bg.addColorStop(1,'rgba(6,12,26,.9)');
  nCtx.fillStyle=bg; nCtx.fillRect(0,0,90,90);
  const f=FRUITS[nxtIdx], sc2=Math.min(34/f.r,1);
  nCtx.save(); nCtx.translate(45,45); nCtx.scale(sc2,sc2);
  drawBall(nCtx,0,0,nxtIdx,1,0); nCtx.restore();
  document.getElementById('nextName').textContent=f.name;
}

// ── Fruit list ────────────────────────────────────────────────
function buildFruitList() {
  const el=document.getElementById('fruitList');
  FRUITS.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='flex items-center gap-1.5 py-0.5';
    d.innerHTML=`<span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${f.hex}"></span>
      <span class="text-[11px] text-white/60 flex-1 truncate">${f.emoji} ${f.name}</span>
      <span class="text-[10px] text-white/25">${f.score}</span>`;
    el.appendChild(d);
    if(i<FRUITS.length-1){
      const a=document.createElement('div');
      a.className='text-white/15 text-[8px] text-center leading-none'; a.textContent='↓';
      el.appendChild(a);
    }
  });
}

// ── Input ─────────────────────────────────────────────────────
function toX(cx){const r=canvas.getBoundingClientRect();return(cx-r.left)*(CW/r.width);}
function toY(cy){const r=canvas.getBoundingClientRect();return(cy-r.top)*(CH/r.height);}

canvas.addEventListener('mousemove',e=>{if(!clearMode)mouseX=toX(e.clientX);});
canvas.addEventListener('click',e=>{
  const x=toX(e.clientX), y=toY(e.clientY);
  if (clearMode){handleClearClick(x,y);return;}
  tryDrop(x);
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!clearMode)mouseX=toX(e.touches[0].clientX);
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const x=toX(e.changedTouches[0].clientX), y=toY(e.changedTouches[0].clientY);
  if(clearMode){handleClearClick(x,y);return;}
  tryDrop(x);
},{passive:false});

// ── CPC reward ────────────────────────────────────────────────
function calcCpc(){return Math.min(Math.floor(score/3),cpcCap);}

async function claimReward() {
  if(rewardClaimed||!account)return;
  const cpc=calcCpc();
  if(cpc<=0){setStatus('分數太低，無法領取','text-red-400');return;}
  document.getElementById('claimBtn').disabled=true;
  setStatus('處理中…','text-white/40');
  try {
    const res=await fetch('/api/suika/reward',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({account,score,cpc})
    });
    const data=await res.json();
    if(data.ok){
      rewardClaimed=true;
      setStatus(`✅ 已領取 ${data.cpc} CPC！`,'text-mint');
      if(data.block_index)
        document.getElementById('modalBlock').textContent=`⛓ 記錄於區塊 #${data.block_index}`;
    } else {
      setStatus(`❌ ${data.error||'領取失敗'}`,'text-red-400');
      document.getElementById('claimBtn').disabled=false;
    }
  } catch {
    setStatus('❌ 連線失敗，請重試','text-red-400');
    document.getElementById('claimBtn').disabled=false;
  }
}

function setStatus(msg,cls){
  const el=document.getElementById('modalStatus');
  el.textContent=msg; el.className=`text-sm min-h-[18px] mb-4 ${cls}`;
}

// ── Controls ──────────────────────────────────────────────────
function restartGame(){
  balls=[]; score=0; gameOver=false; rewardClaimed=false;
  dropCool=0; mergeQueue=[]; floats=[]; ripples=[]; particles=[]; dangerTimer=0;
  activeFx={}; cpcCap=500; wildAvail=false; boomAvail=false;
  clearMode=false; wildUsed=false; boomUsed=false;
  curIdx=rndIdx(); nxtIdx=rndIdx();
  canvas.className='normal-mode';
  document.getElementById('scoreDisplay').textContent='0';
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('claimBtn').disabled=false;
  document.getElementById('modalStatus').textContent='';
  document.getElementById('effectsPanel').classList.add('hidden');
  document.getElementById('effectsList').innerHTML='';
  document.getElementById('wildPanel').classList.add('hidden');
  document.getElementById('nextCard').classList.remove('hidden');
  document.getElementById('clearBtn').classList.add('hidden');
  document.getElementById('clearHint').classList.add('hidden');
  drawNextPreview();
  if(account)loadGameEffects();
}
function goBack(){location.href=backUrl;}

// ── Cloud integration ─────────────────────────────────────────
async function loadGameEffects(){
  try {
    const [ovRes,fxRes]=await Promise.all([
      fetch(`/api/overview?account=${encodeURIComponent(account)}`),
      fetch('/api/suika/start',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({account})}),
    ]);
    const ov=await ovRes.json(), fx=await fxRes.json();

    document.getElementById('balanceDisplay').textContent=`${ov.balance} CPC`;
    const ok=ov.chain_ok;
    ['chainDot','chainDot2'].forEach(id=>document.getElementById(id).style.background=ok?'#5eead4':'#ef4444');
    document.getElementById('chainLabel').textContent=ok?'帳本正常':'帳本異常';
    const cs2=document.getElementById('chainStatus2');
    cs2.textContent=ok?'✅ 帳本鏈正常':'⚠️ 帳本鏈異常';
    cs2.className=`text-[11px] ${ok?'text-mint/70':'text-red-400'}`;

    if(!fx.ok)return;
    activeFx=fx.active_effects||{};
    if(activeFx.suika_cap_boost) cpcCap=1000;

    // Wild ball
    if(activeFx.suika_wild){
      wildAvail=true;
      buildWildGrid();
      document.getElementById('nextCard').classList.add('hidden');
      document.getElementById('wildPanel').classList.remove('hidden');
    }
    // Boom (clear type)
    if(activeFx.suika_boom){
      boomAvail=true;
      document.getElementById('clearBtn').classList.remove('hidden');
    }

    // Effects panel
    const DEFS={
      suika_wild:     {label:'🎱 萬能球',    desc:'自選下一顆球'},
      suika_boom:     {label:'☄️ 隕石清場',  desc:'消除整個系列'},
      suika_cap_boost:{label:'🍉 西瓜護符',  desc:'CPC 上限 1000'},
    };
    const active=Object.keys(activeFx).filter(k=>activeFx[k]);
    if(active.length){
      document.getElementById('effectsPanel').classList.remove('hidden');
      const list=document.getElementById('effectsList'); list.innerHTML='';
      active.forEach(k=>{
        const d=DEFS[k]; if(!d)return;
        const el=document.createElement('div');
        el.className='rounded-lg px-2 py-1.5 text-[11px] font-semibold';
        el.style.cssText='background:rgba(246,200,107,.09);border:1px solid rgba(246,200,107,.25);color:#f6c86b';
        el.innerHTML=`${d.label}<div style="color:rgba(255,255,255,.38);font-size:10px;margin-top:1px">${d.desc}</div>`;
        list.appendChild(el);
      });
    }
  } catch(e){console.warn('loadGameEffects:',e);}
}

// ── Helpers ───────────────────────────────────────────────────
function rndIdx(){return Math.floor(Math.random()*SPAWN_POOL);}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}

// ── Game loop ─────────────────────────────────────────────────
function loop(){
  if(!gameOver){if(dropCool>0)dropCool--;physicsStep();checkDanger();}
  drawFrame(); requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────────
document.getElementById('backLink').href=backUrl;
if(account){
  document.getElementById('accountBadge').textContent=account;
  loadGameEffects();
}
buildFruitList(); drawNextPreview(); loop();
</script>
